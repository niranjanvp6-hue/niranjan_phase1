<!DOCTYPE html>
<html>
<head>
    <title>Card Design</title>
    <style>
        .card {
            width: 250px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/250" alt="image">
    <h3>Card Title</h3>
    <p>This is a simple card design.</p>
</div>

</body>
</html>
