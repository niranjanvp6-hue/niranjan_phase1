<!DOCTYPE html>
<html>
<head>
    <title>Flexbox</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
            background: lightgray;
            padding: 20px;
        }

        .item {
            background: teal;
            color: white;
            padding: 20px;
        }
    </style>
</head>
<body>

<h2>Flexbox Layout</h2>

<div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
</div>

</body>
</html>
