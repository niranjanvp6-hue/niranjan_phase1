<!DOCTYPE html>
<html>
<head>
    <title>Position</title>
    <style>
        .relative {
            position: relative;
            left: 30px;
            background: lightblue;
        }

        .absolute {
            position: absolute;
            top: 50px;
            left: 50px;
            background: pink;
        }

        .fixed {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: yellow;
        }
    </style>
</head>
<body>

<h2>Position Examples</h2>

<div class="relative">Relative</div>
<div class="absolute">Absolute</div>
<div class="fixed">Fixed</div>

</body>
</html>
